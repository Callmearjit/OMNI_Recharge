spring.application.name=operator-service

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Config Server
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.import-check.enabled=false

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
springdoc.show-actuator=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.servers[0].url=http://localhost:8089
springdoc.swagger-ui.servers[0].description=API Gateway

server.forward-headers-strategy=framework

# Database (LOCAL)
spring.datasource.url=jdbc:postgresql://localhost:5432/OMNI_Recharge
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable devtools
spring.devtools.restart.enabled=false