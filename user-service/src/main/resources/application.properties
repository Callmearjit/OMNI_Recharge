spring.application.name=user-service
server.port=8081

# Config Server (optional, won't fail if config-server is not running)
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Default: PostgreSQL on localhost
spring.datasource.url=jdbc:postgresql://localhost:5432/OMNI_Recharge
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# JWT secret
jwt.secret=${JWT_SECRET:secretarjituttt123455667ksfbbfXY}

# Disable devtools
spring.devtools.restart.enabled=false

#---
# Docker profile overrides
spring.config.activate.on-profile=docker

eureka.client.service-url.defaultZone=http://service-registry:8761/eureka
spring.datasource.url=jdbc:postgresql://postgres:5432/OMNI_Recharge
spring.config.import=optional:configserver:http://config-server:8888
spring.cloud.config.enabled=true