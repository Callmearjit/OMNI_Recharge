spring.application.name=recharge-service
server.port=8080

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Config Server
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.enabled=true
spring.cloud.config.import-check.enabled=false

# Circuit Breaker
resilience4j.circuitbreaker.instances.paymentService.sliding-window-size=5
resilience4j.circuitbreaker.instances.paymentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentService.wait-duration-in-open-state=10s



springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
server.forward-headers-strategy=framework

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=true
springdoc.swagger-ui.servers[0].url=http://localhost:8089
springdoc.swagger-ui.servers[0].description=API Gateway
# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/OMNI_Recharge
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

logging.file.name=logs/recharge-service.log
logging.level.root=INFO

spring.devtools.restart.enabled=false

#---
spring.config.activate.on-profile=docker
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka
spring.config.import=optional:configserver:http://config-server:8888
spring.datasource.url=jdbc:postgresql://postgres:5432/OMNI_Recharge
spring.rabbitmq.host=rabbitmq