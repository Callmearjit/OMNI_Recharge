# RECHARGE SERVICE
spring.cloud.gateway.server.webflux.routes[10].id=recharge-service
spring.cloud.gateway.server.webflux.routes[10].uri=lb://RECHARGE-SERVICE
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/recharges/**

# OPERATOR SERVICE
spring.cloud.gateway.server.webflux.routes[11].id=operator-service
spring.cloud.gateway.server.webflux.routes[11].uri=lb://OPERATOR-SERVICE
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/operators/**


# ================================
# EUREKA CONFIG
# ================================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Default: Eureka on localhost
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ================================
# LOGGING
# ================================
logging.file.name=logs/Api-Gateway.log
logging.level.root=INFO
logging.level.com.omni=DEBUG

# JWT secret
jwt.secret=${JWT_SECRET:secretarjituttt123455667ksfbbfXY}

# Disable devtools
spring.devtools.restart.enabled=false

#---
# Docker profile overrides
spring.config.activate.on-profile=docker

eureka.client.service-url.defaultZone=http://service-registry:8761/eureka
