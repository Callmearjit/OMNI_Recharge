spring:
  application:
    name: ServiceRegistry
  devtools:
    restart:
      enabled: false

server:
  port: 8761

# ── Default (local dev) ───────────────────────────────────────────────
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000
  instance:
    hostname: localhost                               # local default

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  file:
    name: logs/ServiceRegistry.log
  level:
    root: INFO
    com.omni: DEBUG

---
# ── Docker profile ────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    register-with-eureka: false                      # ✅ Server does NOT register itself
    fetch-registry: false                            # ✅ Server does NOT fetch from itself
    service-url:
      defaultZone: http://service-registry:8761/eureka/
  instance:
    hostname: service-registry                       # ✅ FIXED: resolves replication timeout
    prefer-ip-address: false
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000
    wait-time-in-ms-when-sync-empty: 0              # ✅ Don't wait for peers on startup
    renewal-percent-threshold: 0.49