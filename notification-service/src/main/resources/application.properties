spring.application.name=notification-service
server.port=8080

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Config Server
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.enabled=true
spring.cloud.config.import-check.enabled=false

springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
server.forward-headers-strategy=framework
springdoc.swagger-ui.servers[0].url=http://localhost:8089
springdoc.swagger-ui.servers[0].description=API Gateway
# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=true

# Jackson - handle LocalDateTime
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-dates-as-timestamps=false

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Disable JPA (no DB in this service)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

logging.file.name=logs/notification-service.log
logging.level.root=INFO

spring.devtools.restart.enabled=false

#---
spring.config.activate.on-profile=docker
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka
spring.config.import=optional:configserver:http://config-server:8888
spring.rabbitmq.host=rabbitmq